name: Release

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: amd64
            asset_name: httpcat-darwin-amd64
          - goos: darwin
            goarch: arm64
            asset_name: httpcat-darwin-arm64
          - goos: linux
            goarch: amd64
            asset_name: httpcat-linux-amd64
          - goos: linux
            goarch: arm64
            asset_name: httpcat-linux-arm64
          - goos: windows
            goarch: amd64
            asset_name: httpcat-windows-amd64.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          go build \
            -trimpath \
            -ldflags "-s -w \
              -X github.com/aaronriekenberg/httpcat/internal/version.Version=${{ github.ref_name }} \
              -X github.com/aaronriekenberg/httpcat/internal/version.Commit=${{ github.sha }} \
              -X github.com/aaronriekenberg/httpcat/internal/version.Date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -o ${{ matrix.asset_name }} \
            .

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset_name }}
